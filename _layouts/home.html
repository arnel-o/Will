---
layout: default
---

<div class="posts">
  {% for post in site.posts %}
  <article class="post-preview">
    <h2><a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a></h2>
    <time>{{ post.date | date: "%B %-d, %Y" }}</time>
    <p>{{ post.content | strip_html | truncatewords: 50 }}</p>
  </article>
  {% endfor %}
</div>
